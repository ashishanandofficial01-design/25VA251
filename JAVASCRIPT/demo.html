<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JS Introduction</title>
</head>
<body>
 <h2>Java Script</h2>  
 <script>
    //JS VARIABLES---------CONTAINER THAT KEEPS EITHER VALUE OR NOT
    //JavaScript variables are containers used for storing data values. They are declared using the keywords var, let, or const, each having specific rules for their scope and whether their values can be changed.

    // USING VAR KEYWORD
    var myName="Ashish Anand";
    //THE DOCUMENT IN JAVASCRIPT IS A GLOBAL OBJECT THAT REPRESENTS THW WEB PAGE LOADED IN THE BROWSER.

    document.write(myName);//output on browser
    console.log(myName);//output on console

    function hello(){
        var msg="THANKS TO VISIT";
        console.log(msg);
    }
    hello();

    //variable declaration using let and const

    let myRollno=2503201000322;
    console.log(myRollno);

    myRollno=2565656565; //no redeclare but can reassigned
    console.log(myRollno);

    const myPhoneno=12345678;
    console.log("MY CONATACT NO IS "+ myPhoneno);

    //myPhoneno  
 </script> 
</body>
</html>
