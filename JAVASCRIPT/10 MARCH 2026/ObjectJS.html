<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Object in JS</title>
</head>
<body>
 <script>
    //Object in JS: collection(pair) of keys (properties) and its value.

    // create an object using literal way...

    let student={
        name:"Rohit",
        age:22,
        isMarried:false,
        address:{
            streetNo:23,
            area:"Sector 62",
            city:"Noida",
            pincode:201301
        },
        course:"B.Tech",
        branch:"CSE",
        year:2025,
        getInfo:function(){
            return " MY EDUCATION DETAILS ARE " + student.branch + "  " + student.year;

        },
        subjects:["Math","Hindi","Science","English"],
        examDone: null
    };
    // access object keys or properties
    console.log(student.address.city); //Object
    console.log(student.getInfo()); // function
    console.log(student.subjects[2]); //array 

    //console.log(typeof(student));

    // find any key in your object
     console.log('name' in student);

     // delete any key from object
     console.log(delete student.isMarried);
        console.log(student);

        //find length of object
        let keysLength=Object.keys(student);
        console.log(keysLength.length);

        //iterate object's keys and values using for loop
        for(let i=0; i<keysLength.length; i++){
        console.log(student[keysLength[i]]);
        }

        // iterate object's keys and values using for...in loop\
        for (let x in student){
            console.log(student[x]);
        }

        //create an object using new keyword
        let myInfo=new Object();
        myInfo.name="Rohit";
        myInfo.age=22;
        myInfo.city="Noida";
        myInfo.course="B.Tech";
        myInfo.branch="CSE";
        myInfo.address=null;
        myInfo.mobile=1234567890;

        // accessing object keys and values
        console.log(myInfo['name']);
 </script>   
</body>
</html>
