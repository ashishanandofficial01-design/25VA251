<!DOCTYPE html>
<html lang="en">
<head>

    <title>Function IN JS</title>

<body>
  <script>
    //function:- block of codes,designed to perform a particular task.
    // types of function:- with parameter and without parameter.

    //normal function
    function demo(){
        console.log("Hello JS");
    }
    demo(); //function calling
    //function with parameter
    function demo1(text){
        console.log("Hello " + text);
    }
    demo1("React");
    //function with default parameter
    function add(a,b=45){
        var num1=a;
        var num2=b;
        var res=num1+num2;
        console.log("Addition of two number is "+ res);
    }
    add(34);
    //synchronous and asynchronous function

    // // // function cal(){
    // // //     function  add(a,b){

    // // //     }
    // // //     function sub(x,y){

    // // //     }
    // // //     function mul(p,q){
    // // //         console.log("Multiplication of two numbers is "+(p*q));
    // // //     }
    // // //     mul(9,6);

    // // //     add(9,10);

    // // }
    // cal();
    //anonymous function in js: function that does not have a name and is often used as an argument to other functions or assigned to variables.

    let msg=function(){
        console.log("Hello ABES");
    }
    msg();
    //short code for above function
    let msg1=()=>console.log("Hello React");
    msg1();
    //arrow function with mmultiple lines
    let msg2=(age)=>{
        if(age>=18){
            console.log("Valid Age");
        }
        else{
        console.log("Minor Age");
    }
}
    msg2(67);

    //callback function in js

    function cal(a,b,callback){
        var num1=a;
        console.log("First number is "+ num1);
        var num2=b;
        console.log("Second number is "+ num2);
        var res=num1+num2;
        callback(res);
    }
    function display(res){
        console.log("Result is "+ res);
    }
    cal(4,5,display);

    function greeting(){
        document.writeln("Welcome to ABES Engineering College");
    }
    function loading(){
        document.writeln("Data Loading..........");
    }
    loading();
    setTimeout(greeting,2000);

    //call back hell.........
    //javascript promises: java script promises were craeted to make as asynchronous javascript easier to use.
    //promises stage.................
    //pending-operation waiting
    //rejected-operation failed
    //fulfilled-operation completed

    let promise=new Promise(function(resolve, reject){
        // asynchronous operation
        let myAge=23;
        if (myAge>=18){
            resolve("Valid Age");
        }
        else{
            reject("Minor Age");
        }
    });
    promise.then(result=>console.log(result)).catch(error=>console.log(error));
    //async and await in js: async and await are used to handle asynchronous operations in a more synchronous way, making the code easier to read and maintain.
    //fetch api in js: fetch api is a modern web API that allows you to make network requests to retrieve resources from a server. It provides a more powerful and flexible way to handle HTTP requests and responses compared to older methods like XMLHttpRequest.

    async function userData(){
        let userResponse=await fetch('https://fakestoreapi.com/products/1')
        let userDataRes=await userResponse.json();
        console.log(userDataRes);
    }
    userData();
    //async await using try catch
    async function productdetail(){
        try{
        let prores=await fetch('https://fakestoreapi.com/products/1');
        let proresdata=await prores.json();
        console.log(proresdata);
    }
    catch(error){
        console.log("NOT VALID DATA"+ error);
    }
    }
    productdetail();
      </script>  
</body>
