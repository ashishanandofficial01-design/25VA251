<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARRAY IN JS</title>
</head>
<body>
    <script>
        let num=[4,5,6,7,8,8,9,9,67,4,4,3,232,1];
        console.log(num.length);
        console.log(num.pop());
        console.log(num.push(10));
        console.log(num.shift());
        console.log(num.unshift(1));
        console.log(num);
        console.log(num.slice(2,5));
        console.log(num.splice(2,5));
        console.log(num);
        console.log(num.indexOf(8));
        console.log(num.lastIndexOf(8));
        console.log(num.includes(8));
        console.log(num.sort());

    </script>
</body>
</html>
