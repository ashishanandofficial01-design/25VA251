<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOM in JS</title>
</head>
<body>
    <h2>CHECK YOUR AGE TO CAST YOUR VOTE</h2>
    <form action="">
        <label for="age">Enter your age:</label>
        <input type="number" id="age" placeholder="Enter your age">
        <button type="button" onclick="checkEligibility()">Check Eligibility</button>
    </form>
    <p id="result"></p> <!-- Added for displaying result -->

    <script>
        // DOM in JS: Basic manipulation example
        function checkEligibility() {
            let age = parseInt(document.getElementById("age").value);
            let result = document.getElementById("result");
            if (isNaN(age)) {
                result.textContent = "Please enter a valid number.";
            } else if (age < 18) {
                result.textContent = "Not eligible to vote.";
            } else {
                result.textContent = "Eligible to vote.";
            }
        }
    </script>
</body>
</html>
