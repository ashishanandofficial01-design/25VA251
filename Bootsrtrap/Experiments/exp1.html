<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- Bootstrap CSS -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  >
<title>Experiment 1</title>
</head>
<body>

  <div class="container">
    <!-- first row header -->
     <div class="row bg-info text-center align-items-center" style="height: 100px;">
      <div class="col-lg-12">
        <h2 >Header</h2>
      </div>
    </div>
   <!-- first row header end --> 

    <button id="btn" class="btn btn-success mt-3">
      Click Me
    </button>

    <p id="message" class="mt-3 fw-bold"></p>
  </div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <!-- JavaScript -->
  <script>
    const button = document.getElementById("btn");
    const message = document.getElementById("message");

    button.addEventListener("click", function () {
      message.innerHTML = "Button Clicked Successfully!";
      message.classList.add("text-danger");
    });
  </script>

</body>
</html>
